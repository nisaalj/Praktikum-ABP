<!DOCTYPE html>
<html>
<head>
    <title>Selamat Tahun Baru Imlek</title>
    <style>
        body {
            background-color: red;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            color: gold;
        }

        .judul {
            font-size: 50px;
            font-weight: bold;
        }

        .subjudul {
            font-size: 25px;
            margin-top: 10px;
        }

        .lampion {
            font-size: 80px;
            animation: goyang 1s infinite alternate;
        }

        @keyframes goyang {
            from { transform: rotate(-10deg); }
            to { transform: rotate(10deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lampion">🏮</div>
        <div class="judul">Gong Xi Fa Cai!</div>
        <div class="subjudul">Selamat Tahun Baru Imlek 2025 🐍</div>
        <div class="subjudul">Semoga asprak murah rezeki dan selalu sehat!</div>
    </div>
</body>
</html>
